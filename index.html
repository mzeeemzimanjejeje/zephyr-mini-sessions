<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Courtney's ENT</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Image CDN: preconnect so every card image loads instantly -->
    <link rel="preconnect" href="https://pbcdnw.aoneroom.com" crossorigin />
    <link rel="dns-prefetch" href="https://pbcdnw.aoneroom.com" />
    <link rel="preconnect" href="https://images.metahub.space" crossorigin />
    <link rel="dns-prefetch" href="https://images.metahub.space" />

    <!-- Video sources: pre-dial all 3 servers so Play has zero startup delay -->
    <link rel="preconnect" href="https://vidsrc.xyz" crossorigin />
    <link rel="dns-prefetch" href="https://vidsrc.xyz" />
    <link rel="preconnect" href="https://vidsrc.to" crossorigin />
    <link rel="dns-prefetch" href="https://vidsrc.to" />
    <link rel="dns-prefetch" href="https://vidsrc.mov" />

    <!-- Preload the hero image (above the fold — highest priority) -->
    <link
      rel="preload"
      as="image"
      href="https://pbcdnw.aoneroom.com/image/2026/03/18/b9bffdc2304fc634195192d7464a6d44.jpg"
      fetchpriority="high"
    />

    <!-- PWA -->
    <meta name="theme-color" content="#e50914" />
    <meta name="description" content="Courtney's ENT — Stream movies and series" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Courtney's ENT" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Ad blocker: block popup ads, new-tab hijacks, and popunder focus-steals -->
    <script>
      // 1. Override window.open so embed players can't spawn popup ad windows
      window.open = function() { return null; };

      // 2. Block popunder ads — they steal window focus to sneak an ad tab behind
      //    Re-focus this window the moment focus is lost unexpectedly
      var _adFocusTimer = null;
      window.addEventListener('blur', function() {
        _adFocusTimer = setTimeout(function() { window.focus(); }, 50);
      });
      window.addEventListener('focus', function() {
        if (_adFocusTimer) { clearTimeout(_adFocusTimer); _adFocusTimer = null; }
      });

      // 3. Intercept any <a target="_blank"> clicks that bubble up from iframes
      document.addEventListener('click', function(e) {
        var t = e.target;
        while (t && t !== document) {
          if (t.tagName === 'A' && t.target === '_blank') {
            var href = t.href || '';
            // Only allow blank-target links that are explicitly inside our app UI
            if (!t.closest('#root')) { e.preventDefault(); e.stopPropagation(); }
          }
          t = t.parentNode;
        }
      }, true);
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
