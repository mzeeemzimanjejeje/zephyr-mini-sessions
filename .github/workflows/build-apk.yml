name: Build & Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install mobile dependencies
        run: cd mobile && npm install

      - name: Install root dependencies (for shared src/)
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Generate Android native project
        run: cd mobile && npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build debug APK
        run: cd mobile/android && ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: courtney-ent-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Publish to GitHub Releases
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"

          # Delete existing release if present
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/apk-latest" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('id',''))" 2>/dev/null || true)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Deleting existing release $EXISTING"
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$EXISTING"
          fi

          # Delete existing tag
          curl -s -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs/tags/apk-latest" || true

          # Create new release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "apk-latest",
              "name": "Courtney ENT — Android App",
              "body": "Tap **courtney-ent.apk** below to install on your Android phone.\n\n> If prompted, enable Install from unknown sources in Android settings.",
              "draft": false,
              "prerelease": false
            }' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          echo "Created release: $RELEASE_ID"

          # Upload APK
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_PATH" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=courtney-ent.apk"

          echo "APK uploaded — download at:"
          echo "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/courtney-ent.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
