name: Build & Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install mobile dependencies
        run: cd mobile && npm install

      - name: Install root dependencies (for shared src/)
        run: npm install --prefix . || true

      - name: Generate Android native project
        run: cd mobile && npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build debug APK
        run: cd mobile/android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          mkdir -p output
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk output/courtney-ent.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Courtney ENT — Android App
          body: |
            ## Download Courtney ENT for Android

            Tap **courtney-ent.apk** to install directly on your phone.

            > If prompted, enable **"Install from unknown sources"** in your Android settings.
          files: output/courtney-ent.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
